<style>

  --text:#f0e8d0; --muted:#7a6a4a; --card:#1a1208; --border:#2a2010;

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;min-height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%}
body{
  font-family:'DM Mono',monospace;color:var(--text);
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(212,160,23,.09) 0%,transparent 60%),#0d0a06;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1rem;min-height:100dvh;
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E")}

/* ══ WAITING SCREEN ══ */
#screen-wait{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;max-width:480px;text-align:center;gap:2rem;
}
.wait-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,10vw,5rem);letter-spacing:.1em;
  background:linear-gradient(180deg,var(--gold3) 0%,var(--gold) 55%,#7a5008 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 14px rgba(212,160,23,.4));line-height:1;
}
.code-box{
  background:var(--card);border:2px solid var(--gold);border-radius:16px;
  padding:2rem 2.5rem;width:100%;
}
.code-label{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.code-value{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,14vw,6rem);
  letter-spacing:.3em;color:var(--gold3);
  filter:drop-shadow(0 0 20px rgba(212,160,23,.6));line-height:1;
}
.code-hint{font-size:.7rem;color:var(--muted);margin-top:.75rem;line-height:1.6}
.code-hint b{color:var(--gold)}
.pulse-ring{
  display:inline-block;width:12px;height:12px;border-radius:50%;
  background:var(--gold);animation:pulseRing 1.5s ease-in-out infinite;margin-right:.4rem;
}
@keyframes pulseRing{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

/* ══ SLOT SCREEN ══ */
#screen-slot{
  position:relative;z-index:1;display:none;
  width:100%;max-width:560px;
  flex-direction:column;align-items:center;gap:.6rem;
}
#screen-slot.active{display:flex}

/* top bar */
.top-bar{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:.75rem;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:.6rem 1rem;
}
.player-chip{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
.p-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;color:#0d0a06}
.p-info{min-width:0;flex:1}
.p-name{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-bal{font-size:.6rem;letter-spacing:.12em;color:var(--muted)}
.p-bal b{color:var(--gold)}
.quit-btn{
  flex-shrink:0;
  background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);
  border-radius:7px;color:var(--red2);font-family:'DM Mono',monospace;
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  padding:0 .85rem;height:36px;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.quit-btn:hover{background:rgba(192,57,43,.28)}
.quit-btn:active{transform:scale(.95)}

/* title row */
.title-row{width:100%;display:flex;align-items:center;justify-content:center;gap:.6rem}
.bulb-row{display:flex;gap:.3rem}
.bulb{width:8px;height:8px;border-radius:50%;background:var(--gold2);
  box-shadow:0 0 6px 2px var(--gold);animation:blink 1.1s infinite alternate}
.bulb:nth-child(odd){animation-delay:.6s}
@keyframes blink{0%{opacity:1}100%{opacity:.15}}
.slot-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);
  letter-spacing:.1em;background:linear-gradient(180deg,var(--gold3) 0%,var(--gold) 60%,#7a5008 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 1px 8px rgba(212,160,23,.4));white-space:nowrap;}

/* payout table */
.payout-wrap{width:100%}
.payout-toggle{width:100%;background:none;border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;
  text-transform:uppercase;padding:.45rem;cursor:pointer;transition:all .2s;text-align:center;
  -webkit-tap-highlight-color:transparent}
.payout-toggle:hover{border-color:var(--gold);color:var(--text)}
.payout-grid{display:none;margin-top:.5rem;display:grid;grid-template-columns:1fr 1fr;gap:.25rem}
.payout-grid.hidden{display:none!important}
.p-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:.3rem .5rem;font-size:clamp(.55rem,1.8vw,.68rem)}
.p-syms{letter-spacing:.04em}
.p-mult{color:var(--gold);font-weight:700;flex-shrink:0;margin-left:.4rem}
.p-mult.j{color:var(--gold3);font-size:1.1em}

/* reels */
.reels-outer{width:100%;background:linear-gradient(135deg,#888 0%,#ccc 20%,#999 50%,#ddd 80%,#888 100%);
  border-radius:10px;padding:5px;box-shadow:0 6px 28px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.3)}

.reel-sep{width:4px;background:linear-gradient(180deg,#444 0%,#aaa 30%,#eee 50%,#aaa 70%,#444 100%);flex-shrink:0}
.reel-w{flex:1;height:calc(var(--cell)*3);overflow:hidden;position:relative;background:#04040a}
.reel-w::before,.reel-w::after{content:'';position:absolute;left:0;right:0;height:30%;z-index:5;pointer-events:none}
.reel-w::before{top:0;background:linear-gradient(180deg,rgba(4,4,10,.96) 0%,transparent 100%)}
.reel-w::after{bottom:0;background:linear-gradient(0deg,rgba(4,4,10,.96) 0%,transparent 100%)}
.reel-strip{display:flex;flex-direction:column;will-change:transform}
.sym{height:var(--cell);display:flex;align-items:center;justify-content:center;
  font-size:clamp(34px,7vw,50px);flex-shrink:0;line-height:1}
.reel-winline{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:var(--cell);pointer-events:none;z-index:8;
  border-top:2px solid rgba(212,160,23,.7);border-bottom:2px solid rgba(212,160,23,.7);
  background:rgba(212,160,23,.04)}
.reel-winline::before,.reel-winline::after{content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:13px;height:13px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold2)}
.reel-winline::before{left:-2px}.reel-winline::after{right:-2px}

/* win overlay */
.win-overlay{position:absolute;inset:0;z-index:20;display:none;
  align-items:center;justify-content:center;border-radius:6px;
  background:radial-gradient(ellipse at center,rgba(212,160,23,.3) 0%,rgba(0,0,0,.55) 80%)}
.win-overlay.show{display:flex;animation:wfade .5s ease-in-out infinite alternate}
@keyframes wfade{from{opacity:.7}to{opacity:1}}
.wo-inner{text-align:center}
.wo-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);
  letter-spacing:.1em;color:var(--gold3);filter:drop-shadow(0 0 16px var(--gold));display:block}
.wo-amt{font-size:clamp(.9rem,3vw,1.4rem);font-weight:700;color:#fff;display:block;margin-top:.2rem}

/* info row */
.info-row{width:100%;display:flex;gap:.45rem}
.info-b{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:.45rem .6rem;text-align:center}
.info-l{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.15rem}
.info-v{font-size:clamp(.82rem,3vw,1.1rem);font-weight:700;color:var(--gold);font-family:'DM Mono',monospace}
.info-v.green{color:var(--green2);animation:vpop .3s ease}
@keyframes vpop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* bet row */
.bet-row{width:100%;display:flex;gap:.35rem}
.bet-btn{flex:1;height:38px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--muted);font-family:'DM Mono',monospace;
  font-size:clamp(.56rem,1.8vw,.7rem);font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bet-btn:hover{border-color:#5a4020;color:var(--text)}
.bet-btn.active{background:rgba(212,160,23,.15);border-color:var(--gold);color:var(--gold)}
.bet-btn:disabled{opacity:.3;cursor:not-allowed}

/* spin button */
.spin-btn{width:100%;height:clamp(50px,8vh,68px);
  background:linear-gradient(180deg,#c0392b 0%,#8b1a0a 50%,#6b1008 100%);
  border:none;border-radius:9px;color:#fff;

  cursor:pointer;position:relative;overflow:hidden;

  transition:all .15s;-webkit-tap-highlight-color:transparent}
.spin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 50%)}
.spin-btn:hover:not(:disabled){background:linear-gradient(180deg,#d44030 0%,#a02010 50%,#7a1208 100%)}
.spin-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 #3a0805}
.spin-btn:disabled{background:linear-gradient(180deg,#444 0%,#222 100%);box-shadow:0 2px 0 #111;cursor:not-allowed;opacity:.5}

/* rt dot */
.rt-dot{width:7px;height:7px;border-radius:50%;display:inline-block;transition:background .3s;flex-shrink:0}

/* screen-flash */
.sflash{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0}
.sflash.go{animation:sflash .5s ease-out}
@keyframes sflash{0%{opacity:.6;background:radial-gradient(ellipse at center,rgba(240,216,120,.4),transparent)}100%{opacity:0}}
</style>
</head>

  function renderReel(r){
    var html='',len=r.strip.length;
    for(var i=-1;i<ROWS-1;i++){var si=((r.offset+i)%len+len)%len;html+='<div class="sym">'+r.strip[si]+'</div>';}
    r.el.innerHTML=html;r.el.style.transition='none';r.el.style.transform='translateY(0)';
  }
  reelData.forEach(renderReel);

  function spinReel(r,targetSym,duration,reelIdx,cb){
    var len=r.strip.length;
    var candidates=[];
    for(var i=0;i<len;i++){if(r.strip[i]===targetSym)candidates.push(i);}
    if(!candidates.length){r.strip[0]=targetSym;candidates=[0];}
    var targetOff=candidates[Math.floor(Math.random()*candidates.length)];
    var spinCells=Math.round(duration/70)+10;
    var cells=[];
    for(var j=0;j<spinCells;j++){cells.push(r.strip[((r.offset-j)%len+len)%len]);}
    cells.push(r.strip[((targetOff-1)%len+len)%len]);
    cells.push(r.strip[targetOff]);
    cells.push(r.strip[((targetOff+1)%len+len)%len]);
    cells.push(r.strip[((targetOff+2)%len+len)%len]);
    cells.push(r.strip[((targetOff+3)%len+len)%len]);
    r.el.innerHTML=cells.map(function(s){return'<div class="sym">'+s+'</div>';}).join('');
    r.el.style.transition='none';r.el.style.transform='translateY(0)';
    var dist=spinCells*CELL;
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      r.el.style.transition='transform '+(duration/1000).toFixed(2)+'s cubic-bezier(.22,.1,.08,1)';
      r.el.style.transform='translateY(-'+dist+'px)';
    });});
    setTimeout(function(){r.offset=((targetOff)%len+len)%len;if(cb)cb();},duration+60);
  }
  function evalResult(res){
    var a=res[0],b=res[1],c=res[2];
    if(a===b&&b===c){
      var m=PAY3[a]||3;
      return{type:a==='7️⃣'?'jackpot':'triple',mult:m,label:a==='7️⃣'?'🎰 JACKPOT!!!':a+a+a+' — DREIFACH!'};
    }
    if(a===b||b===c||a===c)return{type:'pair',mult:2,label:'ZWEI GLEICHE!'};
    return{type:'lose',mult:0,label:null};
  }

  function chips(n){return'⬡ '+(n||0).toLocaleString('de-DE');}

  // ── UI helpers ───────────────────────────────
  function setSpinBtn(on, label){
    var b=document.getElementById('spin-btn');
    b.disabled=!on;b.textContent=label||'DREHEN 🎰';
  }

  function showWinOverlay(title,amt){
    document.getElementById('wo-title').textContent=title;
    document.getElementById('wo-amt').textContent=amt||'';
    document.getElementById('win-overlay').className='win-overlay show';
    document.getElementById('win-overlay').onclick=function(){document.getElementById('win-overlay').className='win-overlay';};
    if(!amt)setTimeout(function(){document.getElementById('win-overlay').className='win-overlay';},3200);
  }

  function flash(){
    var f=document.getElementById('sflash');
    f.className='sflash go';setTimeout(function(){f.className='sflash';},600);
  }

  function setBet(v){
    bet=v;
    document.getElementById('bet-el').textContent='⬡ '+v;
    document.querySelectorAll('.bet-btn').forEach(function(b){b.classList.toggle('active',parseInt(b.dataset.bet)===v);});
  }

  function updatePlayerBar(){
    if(!session)return;
    document.getElementById('p-avatar').textContent=(session.player_name||'?')[0].toUpperCase();
    document.getElementById('p-name').textContent=session.player_name||'—';
    document.getElementById('p-bal').textContent=chips(session.player_balance||0);
  }

  function showWait(){
    document.getElementById('screen-wait').style.display='flex';
    document.getElementById('screen-slot').classList.remove('active');
    session=null;
  }

  function showSlot(sess){
    session=sess;
    document.getElementById('screen-wait').style.display='none';
    document.getElementById('screen-slot').classList.add('active');
    updatePlayerBar();
    // Load fresh balance from users
    if(sess.player_id){
      sb.from('users').select('balance').eq('id',sess.player_id).single().then(function(r){
        if(r.data) document.getElementById('p-bal').textContent = chips(r.data.balance);
      });
      subscribeUserBalance(sess.player_id);
    }
    setSpinBtn(true);
    reelData.forEach(renderReel);
    document.getElementById('lastwin-el').textContent='—';
    document.getElementById('lastwin-el').className='info-v';
    document.getElementById('rounds-el').textContent=rounds;
  }

  // ── Spin ─────────────────────────────────────
  async function doSpin(){
    if(spinning||!session||!session.player_id)return;

    // Always read fresh balance from users table — single source of truth
    var uRes = await sb.from('users').select('balance').eq('id',session.player_id).single();
    if(uRes.error||!uRes.data){ showWinOverlay('Fehler beim Laden des Kontos!',''); return; }
    var currentBal = uRes.data.balance;

    if(currentBal < bet){
      showWinOverlay('NICHT GENUG GUTHABEN!','⬡ '+currentBal.toLocaleString('de-DE')); return;
    }

    spinning = true;
    setSpinBtn(false,'DREHT…');
    document.getElementById('win-overlay').className='win-overlay';
    document.getElementById('lastwin-el').textContent='—';
    document.getElementById('lastwin-el').className='info-v';

    var balAfterBet = currentBal - bet;
    // Update users.balance — this triggers realtime on both tablet + phone
    var w1 = await sb.from('users').update({balance:balAfterBet}).eq('id',session.player_id);
    if(w1.error){ spinning=false; setSpinBtn(true); return; }

    // Update display immediately
    document.getElementById('p-bal').textContent = chips(balAfterBet);

    // Mark slot_sessions as spinning (phone sees this)
    await sb.from('slot_sessions').update({status:'spinning', bet:bet}).eq('table_code',TABLE_CODE);

    var results = [0,1,2].map(function(){ return randSym(); });

    reelData.forEach(renderReel);
    sfxSpin();

    var REEL_STOPS = [REEL1_STOP, REEL2_STOP, REEL3_STOP];
    reelData.forEach(function(r, i){
      spinReel(r, results[i], REEL_STOPS[i], i, function(){
        sfxStop(i);
        if(i===2) finishSpin(results, balAfterBet);
      });
    });
  }

  async function finishSpin(results, balAfterBet){
    var ev     = evalResult(results);
    var winAmt = Math.round(bet * ev.mult);
    rounds++;
    document.getElementById('rounds-el').textContent = rounds;

    await new Promise(function(r){ setTimeout(r,300); });

    var finalBal = balAfterBet + winAmt;

    // Write final balance to users — single write, no race
    await sb.from('users').update({balance:finalBal}).eq('id',session.player_id);

    // Update display immediately (realtime will confirm)
    document.getElementById('p-bal').textContent = chips(finalBal);

    // Write result to slot_sessions so phone sees it
    await sb.from('slot_sessions').update({
      status:     'result',
      win_amount: winAmt,
      symbols:    results
    }).eq('table_code',TABLE_CODE);

    if(ev.type !== 'lose'){
      var lw = document.getElementById('lastwin-el');
      lw.textContent = '⬡ '+winAmt.toLocaleString('de-DE');
      lw.className   = 'info-v green';
      flash();
      showWinOverlay(ev.label, chips(winAmt)+' ('+ev.mult+'×)');
      if(ev.type==='jackpot') sfxJackpot(); else sfxWin();
    } else {
      sfxLose();
    }

    spinning = false;
    setSpinBtn(true);
  }

  // ── Supabase session ─────────────────────────
  async function initSession(){
    document.getElementById('table-code-display').textContent = TABLE_CODE;
    await sb.from('slot_sessions')
      .upsert({table_code:TABLE_CODE, status:'idle', player_id:null,
               player_name:null, player_balance:null, bet:bet, symbols:null, win_amount:0},
              {onConflict:'table_code'});
    subscribeRealtime();
  }

  var userRtChan = null;

  function subscribeRealtime(){
    if(rtChan)    sb.removeChannel(rtChan);
    if(userRtChan)sb.removeChannel(userRtChan);

    // 1) Watch slot_sessions for player joining/leaving
    rtChan = sb.channel('slot-tablet-sess-'+TABLE_CODE)
      .on('postgres_changes',{event:'*',schema:'public',table:'slot_sessions',
                              filter:'table_code=eq.'+TABLE_CODE}, function(p){
        if(!p.new)return;
        var prev = session;
        var d    = p.new;
        if((!prev||!prev.player_id)&&d.player_id){
          showSlot(d);
          // Subscribe to this player's balance changes
          subscribeUserBalance(d.player_id);
          return;
        }
        if(prev&&prev.player_id&&!d.player_id){
          if(userRtChan){ sb.removeChannel(userRtChan); userRtChan=null; }
          showWait(); return;
        }
      })
      .subscribe(function(s){
        var d=document.getElementById('rt-dot');
        if(d)d.style.background=s==='SUBSCRIBED'?'#22cc22':'#d4a017';
      });
  }

  function subscribeUserBalance(playerId){
    if(userRtChan)sb.removeChannel(userRtChan);
    userRtChan = sb.channel('slot-tablet-user-'+playerId)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'users',
                              filter:'id=eq.'+playerId}, function(p){
        // Ignore during our own spin (we set it ourselves)
        if(spinning) return;
        if(!p.new||p.new.balance==null)return;
        document.getElementById('p-bal').textContent = chips(p.new.balance);
      })
      .subscribe();
  }

  async function quitSession(){
    if(!session)return;
    if(!confirm('Sitzung beenden? Der Spieler wird getrennt.'))return;
    if(userRtChan){ sb.removeChannel(userRtChan); userRtChan=null; }
    await sb.from('slot_sessions')
      .update({player_id:null,player_name:null,player_balance:null,
               status:'idle',symbols:null,win_amount:0})
      .eq('table_code',TABLE_CODE);
    showWait();
  }

  // ── Lights ───────────────────────────────────
  ['bulb-row','bulb-row2'].forEach(function(id){
    var el=document.getElementById(id);
    for(var i=0;i<8;i++){var b=document.createElement('div');b.className='bulb';if(i%2)b.style.animationDelay='.6s';el.appendChild(b);}
  });

  // ── Wiring ───────────────────────────────────
  document.getElementById('spin-btn').addEventListener('click', doSpin);
  document.getElementById('quit-btn').addEventListener('click', quitSession);
  document.querySelectorAll('.bet-btn').forEach(function(b){
    b.addEventListener('click', function(){ if(!spinning) setBet(parseInt(b.dataset.bet)); });
  });
  document.addEventListener('keydown', function(e){
    if((e.code==='Space'||e.code==='Enter') && !spinning && session){ e.preventDefault(); doSpin(); }
  });

  // Payout toggle
  var ptOpen = false;
  document.getElementById('payout-toggle').addEventListener('click', function(){
    ptOpen = !ptOpen;
    document.getElementById('payout-grid').classList.toggle('hidden', !ptOpen);
    this.textContent = ptOpen ? '▲ Gewinntabelle ausblenden' : '▼ Gewinntabelle';
  });

  // Unlock AudioContext + preload sound on first user gesture
  document.body.addEventListener('click', function unlock() {
    getAudioCtx();
    preloadAudio();
    document.body.removeEventListener('click', unlock);
  }, { once: true });

  if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(function(){});

  // ── Boot ─────────────────────────────────────
  initSession();
};
</script>
